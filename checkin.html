<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LITALK Education - เช็คชื่อเข้าเรียน</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="img/LITALK-Icon.png" type="image/png">
    <script>
        // Init theme before first paint to prevent flickering
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', savedTheme || (systemPrefersDark ? 'dark' : 'light'));
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/fonts.css?v=20260714h">
    <link rel="stylesheet" href="css/student-portal.css?v=20260718c">
    <style>
        /* Single-purpose page: one centered card, states swapped by JS. */
        .checkin-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .checkin-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            box-shadow: var(--card-shadow);
            padding: 36px 28px;
            text-align: center;
        }

        .checkin-card .logo-img {
            height: 26px;
            margin: 0 auto 24px;
        }

        .checkin-icon {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin: 0 auto 18px;
        }

        .checkin-icon.success {
            background-color: var(--accent-success-bg, rgba(16, 185, 129, 0.12));
            color: var(--accent-success);
        }

        .checkin-icon.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
        }

        .checkin-icon.loading {
            background-color: var(--bg-tertiary);
            color: var(--text-muted);
        }

        .checkin-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .checkin-detail {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .checkin-detail b {
            color: var(--text-primary);
        }

        .checkin-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkin-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .checkin-form label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .checkin-form input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .checkin-form input:focus {
            outline: 2px solid var(--accent-primary, #2563eb);
            outline-offset: 1px;
        }

        .checkin-form .form-error {
            font-size: 13px;
            color: var(--accent-danger);
            min-height: 18px;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="checkin-page">
        <div class="checkin-card">
            <img src="img/LITALK-Black.png" alt="LITALK Logo" class="logo-img">
            <div id="checkin-state">
                <div class="checkin-icon loading"><i class="fas fa-spinner fa-spin"></i></div>
                <div class="checkin-title">กำลังเช็คชื่อ...</div>
                <div class="checkin-detail">กรุณารอสักครู่</div>
            </div>
        </div>
    </div>

    <script>
        const dataApiUrl = 'https://istudent.litalkeducation.com';

        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
            }[ch]));
        }

        // Class times are stored as Bangkok wall-clock strings; render in the
        // scanner's own device timezone (same rule as everywhere else).
        function formatClassMoment(dateYMD, timeHM) {
            const d = new Date(`${dateYMD}T${timeHM}:00+07:00`);
            if (isNaN(d.getTime())) return `${dateYMD} ${timeHM}`;
            return d.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' }) +
                ' เวลา ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
        }

        function render(state) {
            document.getElementById('checkin-state').innerHTML = state;
        }

        function renderError(message) {
            render(`
                <div class="checkin-icon error"><i class="fas fa-circle-xmark"></i></div>
                <div class="checkin-title">เช็คชื่อไม่สำเร็จ</div>
                <div class="checkin-detail">${escapeHtml(message)}</div>
                <div class="checkin-actions">
                    <a class="btn btn-primary" href="https://lin.ee/n4zLBXa" target="_blank" rel="noopener"><i class="fab fa-line"></i> ติดต่อแอดมินทาง LINE</a>
                    <a class="btn btn-danger" href="student">ไปที่พอร์ทัลนักเรียน</a>
                </div>`);
        }

        function renderSuccess(data) {
            const isEvent = data.mode === 'event';
            const detail = isEvent
                ? `กิจกรรม <b>${escapeHtml(data.event)}</b>`
                : `คลาสเรียน${escapeHtml(formatClassMoment(data.date, data.time))}`;
            const alreadyNote = isEvent
                ? 'กิจกรรมนี้ถูกบันทึกการเข้าร่วมไว้ก่อนหน้านี้แล้ว'
                : 'คลาสนี้ถูกบันทึกการเข้าเรียนไว้ก่อนหน้านี้แล้ว';
            render(`
                <div class="checkin-icon success"><i class="fas fa-circle-check"></i></div>
                <div class="checkin-title">${data.already ? 'เช็คชื่อไว้แล้ว' : 'เช็คชื่อสำเร็จ!'}</div>
                <div class="checkin-detail">
                    <b>${escapeHtml(data.studentName)}</b><br>
                    ${detail}
                    ${data.already ? `<br><span style="color: var(--text-muted); font-size: 12.5px;">${alreadyNote}</span>` : ''}
                </div>
                <div class="checkin-actions">
                    <a class="btn btn-primary" href="student"><i class="fas fa-gauge-high"></i> ไปที่พอร์ทัลนักเรียน</a>
                </div>`);
        }

        // Cross-referenced with CHECKIN_CODE_STORAGE_KEY in js/student-portal.js
        // (this page is standalone and doesn't load that file) — the portal
        // and the digital ID card cache the student's opaque check-in code
        // here on last load, so a same-device scan can auto-fill it. The
        // code carries no information about the student on its own, unlike
        // the real student id this used to prefill, so it's safe to leave
        // sitting in localStorage on a shared or lost device.
        const CHECKIN_CODE_STORAGE_KEY = 'litalk_checkin_code';
        function getCachedCheckinCode() {
            try { return localStorage.getItem(CHECKIN_CODE_STORAGE_KEY) || ''; } catch { return ''; }
        }

        // On-site/group events: one QR for everyone, so the server can't know
        // who scanned — ask for their check-in code. presetCode re-fills the
        // value typed on a failed retry (see the need_student branch below),
        // or auto-fills the cached code on the first render.
        function renderStudentForm(eventTitle, presetCode, errorMsg) {
            render(`
                <div class="checkin-icon loading"><i class="fas fa-user-check"></i></div>
                <div class="checkin-title">เช็คชื่อเข้าร่วมกิจกรรม</div>
                <div class="checkin-detail">กิจกรรม <b>${escapeHtml(eventTitle)}</b><br>กรุณากรอกรหัสเช็คชื่อเพื่อยืนยันตัวตน (ดูได้จากบัตรนักเรียนดิจิทัลในพอร์ทัล)</div>
                <form class="checkin-form" id="event-checkin-form">
                    <label for="checkin-code-input">รหัสเช็คชื่อ</label>
                    <input id="checkin-code-input" type="text" autocomplete="off" autocapitalize="characters"
                        placeholder="เช่น 3F9A2E7B" value="${escapeHtml(presetCode)}" required>
                    <p class="form-error" id="checkin-form-error">${escapeHtml(errorMsg || '')}</p>
                    <button type="submit" class="btn btn-primary" id="checkin-submit-btn">
                        <i class="fas fa-circle-check"></i> เช็คชื่อ
                    </button>
                </form>`);
            const form = document.getElementById('event-checkin-form');
            const input = document.getElementById('checkin-code-input');
            if (!presetCode) input.focus();
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const code = input.value.trim().toUpperCase();
                if (!code) {
                    document.getElementById('checkin-form-error').textContent = 'กรุณากรอกรหัสเช็คชื่อ';
                    return;
                }
                document.getElementById('checkin-submit-btn').disabled = true;
                submitCheckin(code, eventTitle);
            });
        }

        let checkinToken = '';

        async function submitCheckin(checkinCode, eventTitle) {
            try {
                const body = { token: checkinToken };
                if (checkinCode) body.checkinCode = checkinCode;
                const res = await fetch(`${dataApiUrl}/checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json().catch(() => ({}));
                if (data.status === 'need_student') {
                    // Event QR: server needs to know who is scanning.
                    renderStudentForm(data.event || '', getCachedCheckinCode(), '');
                    return;
                }
                if (!res.ok || data.status !== 'success') {
                    const message = data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
                    // Wrong code on an event scan: keep the form so they can retry
                    // (but an expired QR is terminal — fall through to the error card).
                    if (checkinCode && eventTitle !== undefined && res.status !== 410) {
                        renderStudentForm(eventTitle, checkinCode, message);
                        return;
                    }
                    renderError(message);
                    return;
                }
                renderSuccess(data);
            } catch (err) {
                renderError('เชื่อมต่อระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
            }
        }

        window.onload = () => {
            checkinToken = new URLSearchParams(window.location.search).get('t') || '';
            if (!checkinToken) {
                renderError('ลิงก์ไม่ถูกต้อง กรุณาสแกน QR จากผู้สอนอีกครั้ง');
                return;
            }
            submitCheckin('');
        };
    </script>
</body>

</html>
